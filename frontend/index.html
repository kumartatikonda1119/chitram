<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Chitram | Movie Discovery Platform</title>
    <meta
      name="description"
      content="Chitram is a modern movie discovery platform where cinema lovers can explore movies, TV shows, actors, and filmmakers, create personalized watchlists, write reviews, join engaging discussions, and receive intelligent recommendations."
    />
    <meta name="author" content="Kumar Tatikonda" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="/film-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/film-icon.svg" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph defaults (overridden per-page by react-helmet-async) -->
    <meta property="og:title" content="Chitram | Movie Discovery Platform" />
    <meta
      property="og:description"
      content="Explore movies, TV shows, actors, and filmmakers. Create watchlists, write reviews, and join a community of cinema lovers."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chitram.dev" />
    <meta property="og:image" content="https://chitram.dev/film-icon.svg" />
    <meta property="og:site_name" content="Chitram" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@chitramwebsite" />
    <meta name="twitter:title" content="Chitram | Movie Discovery Platform" />
    <meta
      name="twitter:description"
      content="Explore movies, TV shows, actors, and filmmakers. Create watchlists, write reviews, and join a community of cinema lovers."
    />
    <meta name="twitter:image" content="https://chitram.dev/film-icon.svg" />

    <!-- Preconnect to external APIs for performance -->
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="google824341c1e7c83b46" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

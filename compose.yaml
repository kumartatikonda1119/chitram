services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      FRONTEND_URL: http://localhost:8080
      NODE_ENV: production
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-http://localhost:8080}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
